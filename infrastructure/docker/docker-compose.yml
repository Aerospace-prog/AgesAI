# ============================================
# AgesAI — Docker Compose (Core Infrastructure)
# ============================================
# Starts all data services required for local development.
# Usage: docker compose -f infrastructure/docker/docker-compose.yml up -d
# ============================================

name: ages-ai

services:
  # ── PostgreSQL 16 ──
  postgresql:
    image: postgres:16-alpine
    container_name: ages-ai-postgresql
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agesai}
      POSTGRES_USER: ${POSTGRES_USER:-agesai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_db_pass_placeholder}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ../../gateway/migrations:/docker-entrypoint-initdb.d/migrations:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-agesai} -d ${POSTGRES_DB:-agesai}"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ages-ai-network

  # ── Redis 7 ──
  redis:
    image: redis:7-alpine
    container_name: ages-ai-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - ages-ai-network

  # ── Qdrant (Vector Database) ──
  qdrant:
    image: qdrant/qdrant:v1.12.5
    container_name: ages-ai-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP API
      - "6334:6334"   # gRPC API
    volumes:
      - qdrantdata:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
      QDRANT__SERVICE__HTTP_PORT: 6333
      QDRANT__LOG_LEVEL: INFO
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:6333/healthz"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - ages-ai-network

  # ── Apache Kafka (KRaft mode — no ZooKeeper) ──
  kafka:
    image: bitnami/kafka:3.8
    container_name: ages-ai-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
      - "9094:9094"
    environment:
      # KRaft mode (no ZooKeeper)
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      # Listeners
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:9094
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:9094
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      # Topics auto-creation for development
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "true"
      # Performance tuning
      KAFKA_CFG_NUM_PARTITIONS: 3
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_CFG_LOG_RETENTION_HOURS: 168
      KAFKA_CFG_LOG_SEGMENT_BYTES: 1073741824
    volumes:
      - kafkadata:/bitnami/kafka
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - ages-ai-network

  # ── MinIO (S3-Compatible Object Storage) ──
  minio:
    image: minio/minio:latest
    container_name: ages-ai-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"   # API
      - "9001:9001"   # Console
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-agesai}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-dev_minio_pass_placeholder}
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ages-ai-network

  # ── MinIO Bucket Initialization ──
  minio-init:
    image: minio/mc:latest
    container_name: ages-ai-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 \"$${MINIO_ROOT_USER:-agesai}\" \"$${MINIO_ROOT_PASSWORD:-dev_minio_pass_placeholder}\";
      mc mb local/ages-ai-storage --ignore-existing;
      mc mb local/ages-ai-repos --ignore-existing;
      echo 'Buckets created successfully';
      "
    networks:
      - ages-ai-network

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  qdrantdata:
    driver: local
  kafkadata:
    driver: local
  miniodata:
    driver: local

networks:
  ages-ai-network:
    driver: bridge
    name: ages-ai-network

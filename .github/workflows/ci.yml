# ============================================
# AgesAI — CI Pipeline
# ============================================
# Runs on every PR and push to main.
# Matrix: Go (gateway), Python (services), Node (frontend)
# ============================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  GO_VERSION: "1.22"
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"

jobs:
  # ── Go Gateway ──
  gateway:
    name: Gateway (Go)
    runs-on: ubuntu-latest
    if: ${{ hashFiles('gateway/go.mod') != '' }}
    defaults:
      run:
        working-directory: gateway
    steps:
      - uses: actions/checkout@v7

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: gateway/go.sum

      - name: Download dependencies
        run: go mod download

      - name: Lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          working-directory: gateway

      - name: Test
        run: go test ./... -v -race -coverprofile=coverage.out -covermode=atomic

      - name: Build
        run: go build -o bin/gateway ./cmd/server

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: gateway/coverage.out
          flags: gateway

  # ── Python Services ──
  services:
    name: Services (Python)
    runs-on: ubuntu-latest
    if: ${{ hashFiles('services/shared/pyproject.toml') != '' }}
    strategy:
      matrix:
        service: [embedding, search, rag]
    defaults:
      run:
        working-directory: services/${{ matrix.service }}
    steps:
      - uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install shared library
        run: pip install -e ../shared

      - name: Install service dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: |
          ruff check .
          ruff format --check .

      - name: Type check
        run: mypy app/ --ignore-missing-imports || true

      - name: Test
        run: pytest tests/ -v --cov=app --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          files: services/${{ matrix.service }}/coverage.xml
          flags: ${{ matrix.service }}

  # ── Frontend ──
  frontend:
    name: Frontend (Next.js)
    runs-on: ubuntu-latest
    if: ${{ hashFiles('frontend/package.json') != '' }}
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Test
        run: npm run test -- --run

      - name: Build
        run: npm run build

  # ── Docker Build ──
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [gateway, services, frontend]
    if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main' && hashFiles('gateway/go.mod') != '' && hashFiles('frontend/package.json') != ''
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Gateway
        uses: docker/build-push-action@v6
        with:
          context: gateway
          push: false
          tags: ages-ai/gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Frontend
        uses: docker/build-push-action@v6
        with:
          context: frontend
          push: false
          tags: ages-ai/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Security Scan ──
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"
          severity: "CRITICAL,HIGH"
          exit-code: "0"

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: "trivy-results.sarif"
